<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Tech Shop</title>
</head>
<body>
    <div class="container">
        <div class="col">
            <h1>Tech Shop Web Store</h1>

            <label>Unesite ime kupca:</label><br>
            <input type="text" id="kupac">
            <br><br>


            <label>Unesite prezime kupca:</label><br>
            <input type="text" id="prezime">
            <br><br>


            <label>Pretraži proizvode:</label><br>
            <input type="text" id="search">
            <br>

            <div class="section-block">
                <button id="prijava">Prijava</button>
                <h3>Gotovi uređaji</h3>
            </div>
    
            <div class="proizvod" data-naziv="laptop">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Laptop" value="950" data-title="Laptop">
                    <label>Laptop (950 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Laptop" disabled>
                </div>
            </div>

            <div class="proizvod"  data-naziv="pc računalo">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Računalo" value="1300" data-title="Računalo"> 
                    <label>PC Računalo (1300 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Računalo" disabled>
                </div>
            </div>

            <div class="proizvod" data-naziv="monitor">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Monitor" value="279.83" data-title="Monitor"> 
                    <label>Monitor (279.83 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Monitor" disabled>
                </div>
            </div>

            <div class="proizvod" data-naziv="printer">
                <div class="proizvod-info">
                     <input type="checkbox" name="proizvodi" title="Printer" value="250" data-title="Printer"> 
                     <label>Printer (250 €)</label>
                     <input type="number" class="qty-input" min="1" value="1" data-title="Printer" disabled>
                </div>
            </div>
            
            <h3>Komponente</h3>

            <div class="proizvod" data-naziv="ram 16gb">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="RAM 16GB" value="85.35" data-title="RAM 16GB"> 
                    <label>RAM 16GB (85.35 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="RAM 16GB" disabled>
                </div>                
            </div>
            <div class="proizvod" data-naziv="matična ploča">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Matična ploča" value="220" data-title="Matična ploča"> 
                    <label>Matična ploča (220 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Matična ploča" disabled>
                </div>
            </div>
            <div class="proizvod"  data-naziv="ssd 1tb">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="SSD 1TB" value="110" data-title="SSD 1TB"> 
                    <label>SSD 1TB (110 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="SSD 1TB" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="kućište">
                <div class="proizvod-info">
                     <input type="checkbox" name="proizvodi" title="Kućište" value="75" data-title="Kućište"> 
                     <label>Kućište (75 €)</label>
                     <input type="number" class="qty-input" min="1" value="1" data-title="Kućište" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="vodeno hlađenje">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Vodeno hlađenje" value="98.99" data-title="Vodeno hlađenje"> 
                    <label>Vodeno hlađenje (98.99 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Vodeno hlađenje" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="procesor intel-i5">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Procesor Intel-i5" value="323" data-title="Procesor Intel-i5"> 
                    <label>Procesor Intel-i5 (323 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Procesor Intel-i5" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="procesor amd-ryzen-5">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Procesor AMD-Ryzen-5" value="179" data-title="Procesor AMD-Ryzen-5"> 
                    <label>Procesor AMD-Ryzen-5 (179 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Procesor AMD-Ryzen-5" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="napajanje crosair">
                <div class="proizvod-info">
                     <input type="checkbox" name="proizvodi" title="Napajanje CORSAIR" value="150" data-title="Napajanje CORSAIR"> 
                     <label>Napajanje CORSAIR (150 €)</label>
                     <input type="number" class="qty-input" min="1" value="1" data-title="Napajanje CORSAIR" disabled>
                </div>
            </div>

            <h3>Dodaci</h3>

            <div class="proizvod" data-naziv="miš">
                 <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Miš" value="19.95" data-title="Miš"> 
                    <label>Miš (19.95 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Miš" disabled>
                 </div>
            </div>
            <div class="proizvod" data-naziv="tipkovnica">
                 <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Tipkovnica" value="50" data-title="Tipkovnica">
                    <label>Tipkovnica (50 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Tipkovnica" disabled>
                 </div>
            </div>
            <div class="proizvod" data-naziv="slušalice">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Slušalice" value="77.23" data-title="Slušalice"> 
                    <label>Slušalice (77.23 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Slušalice" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="mikrofon akg">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Mikrofon AKG" value="305" data-title="Mikrofon AKG"> 
                    <label>Mikrofon AKG (305 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Mikrofon AKG" disabled>
                </div>
            </div>
            <div class="proizvod" data-naziv="toner">
                <div class="proizvod-info">
                    <input type="checkbox" name="proizvodi" title="Toner" value="110" data-title="Toner"> 
                    <label>Toner (110 €)</label>
                    <input type="number" class="qty-input" min="1" value="1" data-title="Toner" disabled>
                </div>
            </div>
        </div>
    
        <div class="col kosarica">
            
            <div class="user-bar">
                <span id="loginInfo">Niste prijavljeni</span>
                        <button id="odjava" style="display:none;">
                            <i class="bi bi-box-arrow-left"></i> Odjava
                        </button>
            </div>
    
            <h3>Košarica</h3>

            <p>Odaberite proizvod koji želite dodati u košaricu</p>
            <div id="rezultat">
                <div class="empty">
                    Trenutno nije odabran niti jedan proizvod
                </div>
            </div><br>

            <div id="total">
                Ukupno: 0 €
            </div>

            <div id="broj_proizvoda">
                Broj odabranih proizvoda: 0
            </div>

            <div id="kupac_ispis">
                Kupac:
            </div>
            
            <div class="gumbi">
                
                <div class="lijevi_gumbi">
                    <button id="kupi">Dodaj u košaricu</button>
                    <button id="obrisi">Očisti košaricu</button>
                </div>
                
                <button id="placanje">Idi na plaćanje</button>

            </div> 
        </div>
    </div>
    <div id="checkout" class="checkout hidden"></div>

    <script src="script.js"></script>
</body>
</html>
